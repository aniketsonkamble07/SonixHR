# =====================================================
# DATABASE CONFIGURATION - Development
# =====================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sonixhr_dev}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool (Development settings)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=20000
spring.datasource.hikari.pool-name=SonixHRDevPool
spring.datasource.hikari.auto-commit=false

# JPA/Hibernate (Development friendly)
spring.jpa.hibernate.ddl-auto=update  
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Hibernate Performance (Development)
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=100
spring.jpa.properties.hibernate.default_batch_fetch_size=16

# =====================================================
# REDIS CONFIGURATION - Development
# =====================================================
spring.data.redis.url=${REDIS_URL:redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=4
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=-1ms
spring.data.redis.lettuce.shutdown-timeout=100ms

# =====================================================
# CACHE CONFIGURATION - Development
# =====================================================
spring.cache.type=redis
spring.cache.redis.time-to-live=10m
spring.cache.redis.cache-null-values=false
spring.cache.redis.key-prefix=sonixhr_dev:
spring.cache.redis.use-key-prefix=true

# Caffeine Local Cache (L1)
spring.cache.caffeine.spec=maximumSize=200,expireAfterAccess=5m

# =====================================================
# JWT CONFIGURATION
# =====================================================
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
app.jwt.cache.enabled=true
app.jwt.cache.ttl-minutes=5

# =====================================================
# APPLICATION CONFIGURATION
# =====================================================
app.name=${APP_NAME:SonixHR-Dev}
app.base-url=${APP_URL:http://localhost:8081}

# Multi-Tenant Configurations
app.tenant.cache.enabled=true
app.tenant.cache.ttl-minutes=5

# Role Configuration
app.roles.super-admin=SUPER_ADMIN
app.roles.admin=ADMIN
app.roles.hr=HR
app.roles.manager=MANAGER
app.roles.employee=EMPLOYEE
app.roles.user=USER

# User Types
app.user-types.platform=PLATFORM
app.user-types.employee=EMPLOYEE
app.user-types.tenant=TENANT

# Token Blacklist
app.token.blacklist.enabled=true
app.token.blacklist.redis-enabled=true
app.token.blacklist.cache-size=5000
app.token.blacklist.cleanup-interval=3600000

# Activation Tokens
app.activation.token.expiry-hours=24
app.reset.token.expiry-hours=1

# =====================================================
# MAIL CONFIGURATION - Development (Use Mailtrap or disable)
# =====================================================
spring.mail.host=${SPRING_MAIL_HOST:${MAIL_HOST:smtp.gmail.com}}
spring.mail.port=${SPRING_MAIL_PORT:${MAIL_PORT:587}}
spring.mail.username=${SPRING_MAIL_USERNAME:${MAIL_USERNAME:}}
spring.mail.password=${SPRING_MAIL_PASSWORD:${MAIL_PASSWORD:}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SMTP_TRUST:smtp.gmail.com}
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8

# Email Enabled (disable in dev to avoid sending real emails)
app.email.enabled=${APP_EMAIL_ENABLED:${EMAIL_ENABLED:false}}

# =====================================================
# ACTUATOR & MONITORING - Development
# =====================================================
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.metrics.export.prometheus.enabled=false
management.health.redis.enabled=true
management.health.db.enabled=true

# =====================================================
# LOGGING CONFIGURATION - Development (Verbose)
# =====================================================
logging.level.root=INFO
logging.level.com.sonixhr=${LOG_LEVEL:DEBUG}
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=INFO
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:DEBUG}
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG:DEBUG}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{ISO8601} %highlight(%-5level) [%thread] %logger{36} - %msg%n
logging.pattern.file=%d{ISO8601} %-5level [%thread] %logger{36} - %msg%n
logging.file.name=logs/sonixhr-dev.log
logging.file.max-size=10MB
logging.file.max-history=7

# =====================================================
# ASYNC CONFIGURATION - Development
# =====================================================
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=50
spring.task.execution.thread-name-prefix=async-dev-

# =====================================================
# RATE LIMITING - Development
# =====================================================
app.rate-limit.enabled=false
app.rate-limit.requests-per-minute=1000
app.rate-limit.requests-per-hour=10000
app.rate-limit.login-attempts=10
app.rate-limit.login-window-minutes=15

# =====================================================
# CORS CONFIGURATION - Development
# =====================================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8081}
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
app.cors.allowed-headers=Authorization,Content-Type,X-Requested-With,X-Tenant-ID,X-Request-ID,Accept,Origin
app.cors.exposed-headers=X-Total-Count,X-Tenant-ID
app.cors.max-age=3600

# =====================================================
# FILE UPLOAD - Development
# =====================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true
app.upload.path=${UPLOAD_PATH:./uploads}
app.upload.allowed-extensions=jpg,jpeg,png,pdf,doc,docx

# =====================================================
# SCHEDULER - Development
# =====================================================
spring.task.scheduling.pool.size=3
spring.task.scheduling.thread-name-prefix=scheduler-dev-

# =====================================================
# DEBUGGING & DEVELOPMENT FEATURES
# =====================================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# DevTools (auto-restart)
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# =====================================================
# APPLICATION SPECIFIC
# =====================================================
app.audit.enabled=true

# Security
app.security.cache.enabled=true
app.security.cache.ttl-minutes=5
app.trust-proxy=false

# Platform specific
app.platform.cache.enabled=true
app.platform.role.cache.enabled=true
app.platform.permission.cache.enabled=true

# Tenant specific
app.tenant.role.cache.enabled=true
app.tenant.role.cache.ttl-minutes=30
app.employee.cache.enabled=true
app.employee.cache.ttl-minutes=10

# Bypass activation configuration (dev testing only)
app.bypass-activation=true

# Number of months to show in dashboard
app.subscription.dashboard.months-back=6

# =====================================================
# SEEDER CONFIGURATION - Development
# =====================================================

# Platform Admin Configuration
app.platform.admin.email=${PLATFORM_ADMIN_EMAIL:admin@sonixhr.com}
app.platform.admin.name=${PLATFORM_ADMIN_NAME:Platform Administrator}
app.platform.admin.role=${PLATFORM_ADMIN_ROLE:Admin}
app.platform.admin.default-password=${PLATFORM_ADMIN_PASSWORD:Admin@2026}

# Seeder Configurations
app.seeder.enabled=true
app.seeder.tenant.default-role=EMPLOYEE
app.seeder.tenant.enabled=true
app.seeder.tenant.super-admin-email=${SUPER_ADMIN_EMAIL:admin@sonixhr.com}

# Shift Default Configuration
app.seeder.shift.default.name=${SHIFT_DEFAULT_NAME:Default Shift}
app.seeder.shift.default.code=${SHIFT_DEFAULT_CODE:DEFAULT}
app.seeder.shift.default.description=${SHIFT_DEFAULT_DESCRIPTION:Standard working hours}
app.seeder.shift.default.start-time=${SHIFT_DEFAULT_START_TIME:09:00}
app.seeder.shift.default.end-time=${SHIFT_DEFAULT_END_TIME:17:00}
app.seeder.shift.default.weekly-offs=${SHIFT_DEFAULT_WEEKLY_OFFS:SATURDAY,SUNDAY}
app.seeder.shift.default.allow-overtime=${SHIFT_DEFAULT_ALLOW_OVERTIME:true}
app.seeder.shift.default.overtime-multiplier=${SHIFT_DEFAULT_OVERTIME_MULTIPLIER:1.5}
app.seeder.shift.default.overtime-threshold=${SHIFT_DEFAULT_OVERTIME_THRESHOLD:30}
app.seeder.shift.default.max-overtime-hours=${SHIFT_DEFAULT_MAX_OVERTIME_HOURS:4.0}
app.seeder.shift.default.full-day-hours=${SHIFT_DEFAULT_FULL_DAY_HOURS:8.0}
app.seeder.shift.default.half-day-hours=${SHIFT_DEFAULT_HALF_DAY_HOURS:4.0}
app.seeder.shift.default.quarter-day-hours=${SHIFT_DEFAULT_QUARTER_DAY_HOURS:2.0}
app.seeder.shift.default.break-duration=${SHIFT_DEFAULT_BREAK_DURATION:60}
app.seeder.shift.default.min-break=${SHIFT_DEFAULT_MIN_BREAK:30}
app.seeder.shift.default.max-break=${SHIFT_DEFAULT_MAX_BREAK:90}
app.seeder.shift.default.late-grace=${SHIFT_DEFAULT_LATE_GRACE:15}
app.seeder.shift.default.early-exit-grace=${SHIFT_DEFAULT_EARLY_EXIT_GRACE:15}
app.seeder.shift.default.checkin-buffer=${SHIFT_DEFAULT_CHECKIN_BUFFER:60}
app.seeder.shift.default.checkout-buffer=${SHIFT_DEFAULT_CHECKOUT_BUFFER:60}

# Admin Default Configuration
app.seeder.admin.default-password=${ADMIN_DEFAULT_PASSWORD:Admin@123}
app.seeder.admin.default-position=${ADMIN_DEFAULT_POSITION:Administrator}
app.seeder.admin.default-employment-type=${ADMIN_DEFAULT_EMPLOYMENT_TYPE:FULL_TIME}
app.jwt.password-reset-expiration=900000