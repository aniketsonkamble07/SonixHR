# ============================================================
# Development Environment Configuration
# ============================================================
spring.application.name=sonixhr

# Server
server.port=${PORT:8081}

spring.profiles.active=${ENV:dev}

# ============================================================
# CORS Configuration - Development (MUST BE DEFINED)
# ============================================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:8081
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=Authorization,Content-Type,X-Tenant-ID,X-Request-ID,Accept,Origin
app.cors.exposed-headers=X-Total-Count,X-Tenant-ID
app.cors.max-age=3600

# Logging
logging.level.com.sonixhr=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Caching
spring.thymeleaf.cache=false
spring.data.redis.repositories.enabled=false

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration=3600000
app.jwt.refresh-expiration=604800000

# Security proxy configuration
app.trust-proxy=false

# Bypass activation configuration (dev testing only)
app.bypass-activation=false

app.subscription.archival-warning-days=23
app.subscription.archival-days=30

# Email and Base URL Configuration
app.email.enabled=true
app.base-url=http://localhost:8081
spring.mail.username=noreply@sonixhr.com
app.email.from=noreply@sonixhr.com
app.frontend.url=http://localhost:3000
app.subscription.dashboard.months-back=6
app.subscription.reactivation-window-days=30