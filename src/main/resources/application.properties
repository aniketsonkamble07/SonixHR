# ============================================================
# Development Environment Configuration
# ============================================================
spring.application.name=sonixhr

# Server
server.port=${PORT:8081}

spring.profiles.active=${ENV:dev}


# Logging
logging.level.com.sonixhr=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Caching
spring.thymeleaf.cache=false
spring.data.redis.repositories.enabled=false


# Flyway configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration=3600000
app.jwt.refresh-expiration=604800000

# Security proxy configuration
app.trust-proxy=false

# Bypass activation configuration (dev testing only)
app.bypass-activation=false

# Subscription Retention & Lifecycle Policy Configurations (Days/Months post-expiration)
app.subscription.archival-warning-days=23
app.subscription.archival-days=30
app.subscription.soft-delete-days=120
app.subscription.final-reminder-months=11