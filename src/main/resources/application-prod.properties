# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ===============================
# JPA CONFIGURATION
# ===============================
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=${PORT:8080}
server.address=0.0.0.0

# ===============================
# MAIL CONFIGURATION (Use environment variables)
# ===============================
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_TIMEOUT:5000}

# ===============================
# EMAIL FEATURE TOGGLE
# ===============================
app.email.enabled=${APP_EMAIL_ENABLED:true}

# ===============================
# JWT CONFIGURATION
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ===============================
# APPLICATION URL
# ===============================
app.url=${APP_URL:https://sonixhr.onrender.com}

# ===============================
# TRUST PROXY CONFIGURATION
# ===============================
app.trust-proxy=${APP_TRUST_PROXY:false}

# ===============================
# REDIS CONFIGURATION
# ===============================
spring.data.redis.url=${REDIS_URL:redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=3000ms
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=-1ms

# ===============================
# CACHE CONFIGURATION
# ===============================
spring.cache.type=redis
spring.cache.redis.time-to-live=10m
spring.cache.redis.cache-null-values=false
spring.cache.redis.key-prefix=sonixhr_prod:
spring.cache.redis.use-key-prefix=true

